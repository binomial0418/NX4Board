<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板模擬控制器</title>
    <!-- 使用線上版 Tailwind 開發工具 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: sans-serif;
        }

        #control-panel {
            width: 350px;
            background: #1e293b;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #preview-area {
            flex: 1;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .form-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .form-group input[type="number"] {
            width: 100%;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            margin-top: 4px;
        }

        .val-display {
            float: right;
            color: #38bdf8;
            font-family: monospace;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
            border: none;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* 輪胎網格小工具 */
        .tire-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .tire-input {
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- 左側控制面板 -->
    <div id="control-panel">
        <h2 class="text-xl font-bold mb-4 border-b border-slate-600 pb-2 text-center text-blue-400">儀表板模擬器</h2>

        <div class="form-group">
            <label>車速 (KM/H) <span class="val-display" id="val_speed">0</span></label>
            <input type="range" id="speed" min="0" max="180" value="0" oninput="syncVal('speed')">
        </div>

        <div class="form-group">
            <label>道路速限 <span class="val-display" id="val_limit">60</span></label>
            <input type="range" id="limit" min="10" max="150" step="10" value="60" oninput="syncVal('limit')">
        </div>

        <div class="form-group">
            <label>引擎轉速 (RPM/動力) <span class="val-display" id="val_rpm">1200</span></label>
            <input type="range" id="rpm" min="0" max="8000" step="100" value="1200" oninput="syncVal('rpm')">
            <small class="text-xs text-slate-400 block mt-1">* 設為 0 會觸發 EV 模式</small>
        </div>

        <div class="form-group border-t border-slate-700 pt-3 mt-3">
            <label>冷卻水溫 (°C) <span class="val-display" id="val_temp">85</span></label>
            <input type="range" id="temp" min="30" max="130" value="85" oninput="syncVal('temp')">
            <small class="text-xs text-slate-400 block mt-1">* > 110 紅色警告，< 60 淡藍警告</small>
        </div>

        <div class="form-group border-t border-slate-700 pt-3 mt-3">
            <label>渦輪壓力 (BAR) <span class="val-display" id="val_turbo">0.00</span></label>
            <input type="range" id="turbo" min="-1" max="2" step="0.01" value="0.00" oninput="syncVal('turbo')">
            <small class="text-xs text-slate-400 block mt-1">* -1 到 2，測試能量條與峰值光標</small>
        </div>

        <div class="form-group">
            <label>大電池電量 (EV %) <span class="val-display" id="val_battery">60.5</span></label>
            <input type="range" id="battery" min="0" max="100" step="0.1" value="60.5" oninput="syncVal('battery')">
        </div>

        <div class="form-group border-t border-slate-700 pt-3 mt-3">
            <label>油箱油量 (%) <span class="val-display" id="val_fuel">80</span></label>
            <input type="range" id="fuel" min="0" max="100" value="80" oninput="syncVal('fuel')">
            <small class="text-xs text-slate-400 block mt-1">* < 15 觸發紅色警告</small>
        </div>

        <div class="form-group">
            <label>總里程 (ODO KM) <span class="val-display" id="val_odo">26000</span></label>
            <input type="range" id="odo" min="0" max="300000" value="26000" oninput="syncVal('odo')">
        </div>

        <div class="form-group border-t border-slate-700 pt-3 mt-3">
            <label class="mb-2">胎壓 (PSI) * 小於32觸發警告</label>
            <div class="tire-grid">
                <div>
                    <span class="text-xs text-slate-400">左前 (FL)</span>
                    <input type="number" id="tpms_fl" class="tire-input" value="35" onchange="syncInput()">
                </div>
                <div>
                    <span class="text-xs text-slate-400">右前 (FR)</span>
                    <input type="number" id="tpms_fr" class="tire-input" value="35" onchange="syncInput()">
                </div>
                <div>
                    <span class="text-xs text-slate-400">左後 (RL)</span>
                    <input type="number" id="tpms_rl" class="tire-input" value="35" onchange="syncInput()">
                </div>
                <div>
                    <span class="text-xs text-slate-400">右後 (RR)</span>
                    <input type="number" id="tpms_rr" class="tire-input" value="35" onchange="syncInput()">
                </div>
            </div>
        </div>

        <div class="mt-6 border-t border-slate-600 pt-5">
            <button class="btn btn-primary" onclick="sendData()">即時更新 (手動觸發)</button>
            <button class="btn btn-warning" onclick="setPreset('ev')">載入：EV 模式 (油車靜止)</button>
            <button class="btn btn-danger" onclick="setPreset('alert')">載入：觸發所有異常警告</button>
            <button class="btn border border-slate-500 hover:bg-slate-700 mt-2"
                onclick="setPreset('normal')">恢復預設值</button>
        </div>
    </div>

    <!-- 右側儀表板預覽 (Iframe) -->
    <div id="preview-area">
        <iframe id="dashboard-frame" src="assets/cd.html" onload="sendData()"></iframe>
    </div>

    <script>
        // 同步 UI 數值
        function syncVal(id) {
            document.getElementById('val_' + id).innerText = document.getElementById(id).value;
            // 預設只要拉動滑桿就立刻更新畫面 (即時反映)
            sendData();
        }

        // 輪胎輸入框同步
        function syncInput() {
            sendData();
        }

        // 收集表單資料並發送給 iframe 內的儀表板
        function sendData() {
            const data = {
                speed: parseFloat(document.getElementById('speed').value),
                limit: parseFloat(document.getElementById('limit').value),
                rpm: parseFloat(document.getElementById('rpm').value),
                temperature: parseFloat(document.getElementById('temp').value),
                battery: parseFloat(document.getElementById('battery').value),
                fuelLevel: parseFloat(document.getElementById('fuel').value),
                odometer: parseFloat(document.getElementById('odo').value),
                fl_pressure: parseFloat(document.getElementById('tpms_fl').value),
                fr_pressure: parseFloat(document.getElementById('tpms_fr').value),
                rl_pressure: parseFloat(document.getElementById('tpms_rl').value),
                rr_pressure: parseFloat(document.getElementById('tpms_rr').value),
                turbo: parseFloat(document.getElementById('turbo').value),
            };

            const frame = document.getElementById('dashboard-frame');
            if (frame && frame.contentWindow) {
                // 改用標準跨域傳遞，避開 file:// 的跨來源安全封鎖
                frame.contentWindow.postMessage(JSON.stringify(data), '*');
            }
        }

        // 常見的情境腳本按鈕
        function setPreset(mode) {
            if (mode === 'ev') {
                document.getElementById('speed').value = 0;
                document.getElementById('limit').value = 50;
                document.getElementById('rpm').value = 0;
                document.getElementById('temp').value = 50; // <60 顯示藍色心跳
                document.getElementById('battery').value = 98.5;
                ['fl', 'fr', 'rl', 'rr'].forEach(pos => document.getElementById(`tpms_${pos}`).value = 35);
            } else if (mode === 'alert') {
                document.getElementById('speed').value = 145; // 超速
                document.getElementById('limit').value = 110;
                document.getElementById('rpm').value = 4500;
                document.getElementById('temp').value = 115; // >110 水溫過熱紅色心跳
                document.getElementById('battery').value = 15.0;
                document.getElementById('fuel').value = 10; // 觸發低油量警告
                document.getElementById('odo').value = 99999;
                // 左邊兩個輪胎沒氣破掉
                document.getElementById('tpms_fl').value = 28;
                document.getElementById('tpms_rl').value = 29;
                document.getElementById('tpms_fr').value = 36;
                document.getElementById('tpms_rr').value = 36;
            } else if (mode === 'normal') {
                document.getElementById('speed').value = 80;
                document.getElementById('limit').value = 90;
                document.getElementById('rpm').value = 1200;
                document.getElementById('temp').value = 85;
                document.getElementById('battery').value = 60.5;
                document.getElementById('fuel').value = 80;
                document.getElementById('odo').value = 26000;
                ['fl', 'fr', 'rl', 'rr'].forEach(pos => document.getElementById(`tpms_${pos}`).value = 35);
            }

            // 更新滑桿旁的文字顯示
            ['speed', 'limit', 'rpm', 'temp', 'turbo', 'battery', 'fuel', 'odo'].forEach(id => {
                const el = document.getElementById(id);
                if (el) document.getElementById('val_' + id).innerText = el.value;
            });

            // 送出資料
            sendData();
        }
    </script>
</body>

</html>
