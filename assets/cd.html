<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="tailwind.min.js"></script>
    <title>Tucson Link Dashboard - Max Speed Limit</title>
    <style>
        @font-face {
            font-family: 'Chakra Petch';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/ChakraPetch-Bold.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Chakra Petch';
            font-style: italic;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/ChakraPetch-BoldItalic.woff2') format('woff2');
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Chakra Petch', sans-serif;
        }

        .data-card {
            border-left: 6px solid #3b82f6;
            background: linear-gradient(90deg, rgba(31, 41, 55, 0.6) 0%, rgba(31, 41, 55, 0) 100%);
            transition: all 0.3s ease;
        }

        .font-mono-custom {
            font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* 速限看板：加大至 22rem 避免三位數字溢出 */
        .speed-limit-sign {
            width: 22rem;
            height: 22rem;
            background-color: white;
            border: 2rem solid #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .overspeed {
            animation: pulse-red 0.5s infinite alternate;
        }

        @keyframes pulse-red {
            from {
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            }

            to {
                box-shadow: 0 0 80px rgba(255, 0, 0, 0.9);
                background-color: #ffebeb;
            }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100%;
            }
        }

        .alert-pulse {
            animation: text-pulse-red 0.8s infinite alternate !important;
            color: #ff3333 !important;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8) !important;
        }

        @keyframes text-pulse-red {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body class="bg-black h-screen w-screen overflow-hidden flex items-center justify-center select-none relative">



    <div id="app-container" class="w-[2400px] h-[1080px] p-12 origin-center shrink-0 relative overflow-hidden">
        <div class="scanline"></div>

        <div class="flex h-full w-full relative z-20">

            <div class="w-[38%] flex flex-col justify-between py-6 pr-16 gap-6">
                <div class="flex-1 flex gap-6 h-[28%]">
                    <div class="data-card p-8 flex-1 flex flex-col justify-center border-l-blue-400">
                        <p class="text-blue-400 text-[4rem] font-bold mb-2 tracking-widest uppercase">動力</p>
                        <div class="flex items-baseline mt-2">
                            <span id="rpm"
                                class="text-[11rem] font-bold text-white leading-none tracking-tighter">1200</span>
                            <span id="rpm_unit" class="text-5xl ml-4 text-gray-500 italic font-black">RPM</span>
                        </div>
                    </div>
                    <div class="data-card p-8 w-[45%] flex flex-col justify-center border-l-orange-500">
                        <p
                            class="text-orange-500 text-[3.2rem] whitespace-nowrap font-bold tracking-wider uppercase mb-6">
                            胎壓(PSI)</p>

                        <!-- 前輪 (Front) -->
                        <div class="flex w-full items-center justify-between mb-4">
                            <!-- FL 強制靠向左邊中線，並在右側創造實體抗黏連空白 -->
                            <div class="w-1/2 flex justify-end pr-14">
                                <span id="tpms_fl" class="text-[5.5rem] font-bold text-white leading-none">35</span>
                            </div>
                            <!-- FR 強制靠向右邊中線，並在左側創造實體抗黏連空白 -->
                            <div class="w-1/2 flex justify-start pl-14">
                                <span id="tpms_fr" class="text-[5.5rem] font-bold text-white leading-none">35</span>
                            </div>
                        </div>

                        <!-- 圖片中隱約的前後輪分隔線 -->
                        <div class="w-[85%] h-[2px] bg-gray-800 mx-auto my-1"></div>

                        <!-- 後輪 (Rear) -->
                        <div class="flex w-full items-center justify-between mt-4">
                            <div class="w-1/2 flex justify-end pr-14">
                                <span id="tpms_rl" class="text-[5.5rem] font-bold text-gray-500 leading-none">35</span>
                            </div>
                            <div class="w-1/2 flex justify-start pl-14">
                                <span id="tpms_rr" class="text-[5.5rem] font-bold text-gray-500 leading-none">35</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="data-card p-10 flex-1 flex flex-col justify-center border-l-cyan-500 h-[28%]">
                    <p class="text-cyan-500 text-[4rem] font-bold mb-4 tracking-widest uppercase">水溫</p>
                    <div class="flex items-baseline mt-2">
                        <span id="temp"
                            class="text-[13rem] font-bold text-white leading-none tracking-tighter">100</span>
                        <span class="text-6xl ml-6 text-gray-500 font-bold">°C</span>
                    </div>
                </div>

                <div class="data-card p-10 flex-1 flex flex-col justify-center border-l-emerald-500 h-[28%]">
                    <p class="text-emerald-500 text-[4rem] font-bold mb-4 tracking-widest uppercase">EV</p>
                    <div class="flex items-baseline mt-2">
                        <span id="battery"
                            class="text-[13rem] font-bold text-white leading-none tracking-tighter">60.5</span>
                        <span class="text-6xl ml-6 text-gray-500 font-bold">%</span>
                    </div>
                </div>
            </div>

            <div class="w-[62%] flex flex-col justify-center items-center">
                <div class="w-full flex flex-col items-center mt-12">

                    <div class="flex items-end mb-6">
                        <span id="speed"
                            class="text-[40rem] font-black leading-[0.8] italic text-white drop-shadow-[0_0_50px_rgba(255,255,255,0.7)] tracking-tighter">120</span>
                        <span
                            class="text-6xl text-gray-400 font-black tracking-widest uppercase mb-16 ml-8 italic">KM/H</span>
                    </div>

                    <div class="flex items-center justify-center w-[85%] my-4 relative">
                        <div class="w-1/3 h-[2px] bg-gradient-to-r from-transparent via-gray-600 to-gray-400"></div>
                        <div id="limit_container"
                            class="mx-12 speed-limit-sign relative bg-white border-[2.5rem] border-red-500 shadow-[0_0_50px_rgba(255,0,0,0.6)] z-10">
                            <span id="limit_value"
                                class="text-black text-[9.5rem] font-black leading-none mt-2 tracking-tighter">60</span>
                        </div>
                        <div class="w-1/3 h-[2px] bg-gradient-to-l from-transparent via-gray-600 to-gray-400"></div>
                        <!-- Extended blueish line behind the sign seen in design -->
                        <div class="absolute w-[90%] h-px bg-blue-400/30 top-1/2 -z-10 blur-[1px]"></div>
                    </div>

                    <div class="flex items-center mt-2">
                        <span id="time" class="text-[11rem] font-bold text-gray-300 tracking-wider">11:07</span>
                    </div>
                </div>
            </div>

        </div>

        <script>
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('time').innerText = `${h}:${m}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            // 由 Flutter 呼叫來更新數值
            function updateDashboard(data) {
                if (typeof data === 'string') {
                    try {
                        data = JSON.parse(data);
                    } catch (e) {
                        console.error('Invalid JSON', e);
                        return;
                    }
                }
                if (data.speed !== undefined) document.getElementById('speed').innerText = data.speed;
                if (data.rpm !== undefined) {
                    const rpmEl = document.getElementById('rpm');
                    const rpmUnit = document.getElementById('rpm_unit');
                    if (parseInt(data.rpm) === 0) {
                        rpmEl.innerText = "EV";
                        rpmEl.classList.remove('text-white');
                        rpmEl.classList.add('text-green-500');
                        rpmEl.style.letterSpacing = '1rem';
                        if (rpmUnit) rpmUnit.style.display = 'none';
                    } else {
                        rpmEl.innerText = data.rpm;
                        rpmEl.classList.remove('text-green-500');
                        rpmEl.classList.add('text-white');
                        rpmEl.style.letterSpacing = '';
                        if (rpmUnit) rpmUnit.style.display = 'inline';
                    }
                }

                if (data.temp !== undefined) {
                    const tempEl = document.getElementById('temp');
                    tempEl.innerText = data.temp;
                    if (parseInt(data.temp) > 90) {
                        tempEl.classList.add('alert-pulse');
                    } else {
                        tempEl.classList.remove('alert-pulse');
                    }
                }

                if (data.battery !== undefined) document.getElementById('battery').innerText = data.battery;
                if (data.limit !== undefined) document.getElementById('limit_value').innerText = data.limit;

                ['tpms_fl', 'tpms_fr', 'tpms_rl', 'tpms_rr'].forEach(key => {
                    if (data[key] !== undefined) {
                        const el = document.getElementById(key);
                        if (el) {
                            el.innerText = data[key];
                            if (parseFloat(data[key]) < 32) {
                                el.classList.add('alert-pulse');
                            } else {
                                el.classList.remove('alert-pulse');
                            }
                        }
                    }
                });

                // 超速邏輯
                const speed = parseInt(document.getElementById('speed').innerText);
                const limit = parseInt(document.getElementById('limit_value').innerText);
                const sign = document.getElementById('limit_container');
                if (speed > limit) {
                    sign.classList.add('overspeed');
                } else {
                    sign.classList.remove('overspeed');
                }
            }

            function resizeApp() {
                const container = document.getElementById('app-container');
                if (!container) return;
                const scale = Math.min(window.innerWidth / 2400, window.innerHeight / 1080);
                container.style.transform = `scale(${scale})`;
            }
            window.addEventListener('resize', resizeApp);
            window.addEventListener('orientationchange', resizeApp);
            window.addEventListener('load', resizeApp);

            // 監聽來自 simulator 模擬器的跨來源呼叫
            window.addEventListener('message', function (event) {
                // 如果是字串嘗試轉換後丟給 updateDashboard
                if (typeof event.data === 'string') {
                    try {
                        const parsed = JSON.parse(event.data);
                        updateDashboard(parsed);
                    } catch (e) { }
                }
            });

        </script>
    </div>
</body>

</html>
