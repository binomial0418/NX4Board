<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="tailwind.min.js"></script>
    <title>Tucson Link Dashboard - Max Speed Limit</title>
    <style>
        @font-face {
            font-family: 'Chakra Petch';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/ChakraPetch-Bold.woff2') format('woff2');
        }

        /* 引入圓潤且具備高級幾何感的 Outfit 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&display=swap');

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* 圓潤數值專用樣式 */
        .val-rounded {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .data-card {
            position: relative;
            border-left: 6px solid;
            border-left-color: var(--stripe-color, transparent);
            background: linear-gradient(90deg, rgba(31, 41, 55, 0.6) 0%, rgba(31, 41, 55, 0) 100%);
            transition: border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .data-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.0), transparent 150%);
            opacity: 0;
            transition: background 0.35s ease, opacity 0.35s ease, box-shadow 0.35s ease;
        }

        .data-card.card-update::before {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
            opacity: 1;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.45);
        }

        .font-mono-custom {
            font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* 速限看板：加大至 22rem 避免三位數字溢出 */
        .speed-limit-sign {
            width: 22rem;
            height: 22rem;
            background-color: white;
            border: 2rem solid #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .speed-red-glow {
            filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)) !important;
            color: #ffcccc !important;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100%;
            }
        }

        .alert-pulse {
            animation: text-pulse-red 0.8s infinite alternate !important;
            color: #ff3333 !important;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8) !important;
        }

        @keyframes text-pulse-red {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        .alert-pulse-blue {
            animation: text-pulse-blue 0.8s infinite alternate !important;
            color: #60a5fa !important;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.8) !important;
        }

        @keyframes text-pulse-blue {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        .camera-alert-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(185, 28, 28, 0.95) 100%);
            border: 6px solid #fff;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
            animation: slide-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        @keyframes slide-up {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-black h-screen w-screen overflow-hidden flex items-center justify-center select-none relative">



    <div id="app-container" class="w-[2400px] h-[1080px] p-12 origin-center shrink-0 relative overflow-hidden">
        <div class="scanline"></div>

        <div class="flex h-full w-full relative z-20">

            <div class="w-[38%] flex flex-col justify-between py-6 pr-16 gap-6">
                <div class="flex-1 flex gap-6 h-[28%]">
                    <div id="card-rpm"
                        class="data-card p-8 w-[75%] shrink-0 flex flex-col justify-center border-l-blue-400">
                        <p class="text-white text-[4rem] font-bold mb-2 tracking-widest uppercase">動力</p>
                        <div class="flex items-baseline -mt-6">
                            <span id="rpm"
                                class="text-[14rem] font-bold text-white leading-none tracking-tighter val-rounded ">--</span>
                            <span id="rpm_unit" class="text-5xl ml-4 text-gray-500 italic font-black">RPM</span>
                        </div>
                    </div>
                    <div id="card-tpms"
                        class="data-card p-8 w-[45%] shrink-0 flex flex-col justify-center border-l-orange-500 ml-[5em]">
                        <p class="text-white text-[3.2rem] whitespace-nowrap font-bold tracking-wider uppercase mb-2">
                            胎壓(PSI)</p>

                        <!-- 前輪 (Front) -->
                        <div class="flex w-full items-center justify-between mb-1">
                            <!-- FL 強制靠向左邊中線，並在右側創造實體抗黏連空白 -->
                            <div class="w-1/2 flex justify-end pr-6">
                                <span id="tpms_fl"
                                    class="text-[6rem] font-bold text-white leading-none val-rounded">--</span>
                            </div>
                            <!-- FR 強制靠向右邊中線，並在左側創造實體抗黏連空白 -->
                            <div class="w-1/2 flex justify-start pl-9">
                                <span id="tpms_fr"
                                    class="text-[6rem] font-bold text-white leading-none val-rounded">--</span>
                            </div>
                        </div>

                        <!-- 圖片中隱約的前後輪分隔線 -->
                        <div class="w-[85%] h-[2px] bg-gray-800 mx-auto my-1"></div>

                        <!-- 後輪 (Rear) -->
                        <div class="flex w-full items-center justify-between mt-1">
                            <div class="w-1/2 flex justify-end pr-6">
                                <span id="tpms_rl"
                                    class="text-[6rem] font-bold text-white leading-none val-rounded">--</span>
                            </div>
                            <div class="w-1/2 flex justify-start pl-9">
                                <span id="tpms_rr"
                                    class="text-[6rem] font-bold text-white leading-none val-rounded">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex gap-6 h-[28%]">
                    <div id="card-battery"
                        class="data-card p-8 w-[75%] shrink-0 flex flex-col justify-center border-l-emerald-500">
                        <p class="text-white text-[4rem] font-bold mb-2 tracking-widest uppercase">大電池</p>
                        <div class="flex items-baseline -mt-6">
                            <span id="battery"
                                class="text-[14rem] font-bold text-white leading-none tracking-tighter val-rounded">--</span>
                            <span class="text-6xl ml-6 text-gray-500 font-bold">%</span>
                        </div>
                    </div>
                    <div id="card-odo-fuel"
                        class="data-card p-8 w-[45%] shrink-0 flex flex-col justify-center border-l-indigo-500 ml-[5em]">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-baseline">
                                <span class="text-white text-[2.8rem] font-bold mr-4">ODO</span>
                                <span id="odo" class="text-[4rem] font-bold text-white val-rounded">--</span>
                                <span class="text-3xl ml-2 text-gray-500 font-black">KM</span>
                            </div>
                            <div class="w-full h-[2px] bg-gray-800 my-1"></div>
                            <div class="flex items-baseline">
                                <span class="text-white text-[2.8rem] font-bold mr-4">油箱</span>
                                <span id="fuel" class="text-[4rem] font-bold text-white val-rounded">--</span>
                                <span class="text-3xl ml-2 text-gray-500 font-black">%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="card-temp"
                    class="data-card p-10 flex-1 flex flex-col justify-center border-l-cyan-500 h-[28%]">
                    <p class="text-white text-[4rem] font-bold mb-4 tracking-widest uppercase">水溫</p>
                    <div class="flex items-baseline -mt-6">
                        <span id="temp"
                            class="text-[14rem] font-bold text-white leading-none tracking-tighter val-rounded">--</span>
                        <span class="text-6xl ml-6 text-gray-500 font-bold">°C</span>
                    </div>
                </div>
            </div>

            <div class="w-[62%] flex flex-col justify-center items-center">
                <div id="central_group"
                    class="w-full flex flex-col items-center mt-4 transition-transform duration-500">

                    <div class="flex items-end mb-2 ml-[10em]">
                        <span id="speed"
                            class="text-[34rem] font-black leading-[0.85] pt-6 pb-2 text-white tracking-tighter inline-block val-rounded">--</span>
                        <span
                            class="text-6xl text-gray-400 font-black tracking-widest uppercase mb-12 ml-6 italic">KM/H</span>
                    </div>

                    <div id="limit_wrapper" class="flex items-center justify-center w-[85%] my-2 relative"
                        style="display: none;">
                        <div class="w-1/3 h-[2px] bg-gradient-to-r from-transparent via-gray-600 to-gray-400"></div>
                        <div id="limit_container"
                            class="mx-12 speed-limit-sign relative bg-white border-[2.5rem] border-red-500 shadow-[0_0_50px_rgba(255,0,0,0.6)] z-10">
                            <span id="limit_value"
                                class="text-black text-[9.5rem] font-black leading-none mt-2 tracking-tighter val-rounded">60</span>
                        </div>
                        <div class="w-1/3 h-[2px] bg-gradient-to-l from-transparent via-gray-600 to-gray-400"></div>
                        <!-- Extended blueish line behind the sign seen in design -->
                        <div class="absolute w-[90%] h-px bg-blue-400/30 top-1/2 -z-10 blur-[1px]"></div>
                    </div>

                    <!-- OCR 關閉時顯示的分隔線 -->
                    <div id="ocr_off_divider"
                        class="w-1/3 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent my-12 opacity-60 hidden">
                    </div>

                    <div class="flex items-center mt-4 ml-[2em]">
                        <span id="time"
                            class="text-[12rem] font-bold text-gray-300 tracking-wider leading-[0.85] pt-4 pb-2 inline-block val-rounded">11:07</span>
                    </div>

                </div>
            </div>

        </div>

        <script>
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('time').innerText = `${h}:${m}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            const CARD_HIGHLIGHT_DURATION = 420;
            const highlightTimers = {};
            let alertStartTime = null;
            let minDisplayUntil = 0; // 強迫顯示直到此時
            let lastCameraLimit = null; // 暫存最後一次偵測到的相機速限
            const ALERT_TIMEOUT_MS = 60000; // 60秒自動消失

            const prevValues = {
                rpm: document.getElementById('rpm')?.innerText ?? '',
                tpms_fl: document.getElementById('tpms_fl')?.innerText ?? '',
                tpms_fr: document.getElementById('tpms_fr')?.innerText ?? '',
                tpms_rl: document.getElementById('tpms_rl')?.innerText ?? '',
                tpms_rr: document.getElementById('tpms_rr')?.innerText ?? '',
                temp: document.getElementById('temp')?.innerText ?? '',
                battery: document.getElementById('battery')?.innerText ?? '',
                fuel: document.getElementById('fuel')?.innerText ?? '',
                odo: document.getElementById('odo')?.innerText ?? ''
            };

            function triggerCardHighlight(cardId) {
                const card = document.getElementById(cardId);
                if (!card) return;
                card.classList.add('card-update');
                if (highlightTimers[cardId]) {
                    clearTimeout(highlightTimers[cardId]);
                }
                highlightTimers[cardId] = setTimeout(() => {
                    card.classList.remove('card-update');
                    highlightTimers[cardId] = null;
                }, CARD_HIGHLIGHT_DURATION);
            }

            function markCardValueChange(key, value, cardId) {
                if (value === undefined || value === null) return false;
                const normalized = String(value);
                if (prevValues[key] === normalized) return false;
                prevValues[key] = normalized;
                triggerCardHighlight(cardId);
                return true;
            }

            // 由 Flutter 呼叫來更新數值
            function updateDashboard(data) {
                if (typeof data === 'string') {
                    try {
                        data = JSON.parse(data);
                    } catch (e) {
                        console.error('Invalid JSON', e);
                        return;
                    }
                }
                if (data.speed !== undefined) {
                    const speedEl = document.getElementById('speed');
                    speedEl.innerText = (data.speed === null) ? "--" : Math.round(parseFloat(data.speed));
                }
                if (data.rpm !== undefined) {
                    const rpmEl = document.getElementById('rpm');
                    const rpmUnit = document.getElementById('rpm_unit');
                    if (data.rpm === null) {
                        rpmEl.innerText = "--";
                        rpmEl.classList.remove('text-green-500', 'italic');
                        rpmEl.classList.add('text-white');
                        if (rpmUnit) rpmUnit.style.display = 'inline';
                    } else {
                        const rpmVal = Math.round(parseFloat(data.rpm));
                        const rpmDisplay = rpmVal === 0 ? 'EV' : rpmVal;
                        if (rpmVal === 0) {
                            rpmEl.innerText = "EV";
                            rpmEl.classList.remove('text-white');
                            rpmEl.classList.add('text-green-500', 'italic');
                            rpmEl.style.letterSpacing = '1rem';
                            if (rpmUnit) rpmUnit.style.display = 'none';
                        } else {
                            rpmEl.innerText = rpmVal;
                            rpmEl.classList.remove('text-green-500', 'italic');
                            rpmEl.classList.add('text-white');
                            rpmEl.style.letterSpacing = '';
                            if (rpmUnit) rpmUnit.style.display = 'inline';
                        }
                    }
                    markCardValueChange('rpm', data.rpm, 'card-rpm');
                }

                if (data.temperature !== undefined) {
                    const tempEl = document.getElementById('temp');
                    if (data.temperature === null) {
                        tempEl.innerText = "--";
                        tempEl.classList.remove('alert-pulse', 'alert-pulse-blue');
                    } else {
                        const tempVal = Math.round(parseFloat(data.temperature));
                        tempEl.innerText = tempVal;
                        markCardValueChange('temp', tempVal, 'card-temp');
                        tempEl.classList.remove('alert-pulse', 'alert-pulse-blue');
                        if (tempVal > 110) tempEl.classList.add('alert-pulse');
                        else if (tempVal < 40) tempEl.classList.add('alert-pulse-blue');
                    }
                }

                if (data.battery !== undefined) {
                    const batteryEl = document.getElementById('battery');
                    if (data.battery === null) {
                        batteryEl.innerText = "--";
                    } else {
                        const batteryText = parseFloat(data.battery).toFixed(1);
                        batteryEl.innerText = batteryText;
                        markCardValueChange('battery', batteryText, 'card-battery');
                    }
                }

                const odoEl = document.getElementById('odo');
                if (data.odometer !== undefined || data.odo !== undefined || data.mileage !== undefined) {
                    const val = data.odometer || data.odo || data.mileage;
                    if (val === null || val === undefined) {
                        odoEl.innerText = "--";
                    } else {
                        const text = Math.round(val);
                        odoEl.innerText = text;
                        markCardValueChange('odo', text, 'card-odo-fuel');
                    }
                }

                const fuelEl = document.getElementById('fuel');
                if (data.fuel !== undefined || data.fuelLevel !== undefined) {
                    const val = data.fuel !== undefined ? data.fuel : data.fuelLevel;
                    if (val === null || val === undefined) {
                        fuelEl.innerText = "--";
                        fuelEl.classList.remove('alert-pulse');
                    } else {
                        const fuelVal = Math.round(val);
                        fuelEl.innerText = fuelVal;
                        markCardValueChange('fuel', fuelVal, 'card-odo-fuel');
                        if (fuelVal < 15) fuelEl.classList.add('alert-pulse');
                        else fuelEl.classList.remove('alert-pulse');
                    }
                }

                // 胎壓
                if (data.fl_pressure !== undefined) document.getElementById('tpms_fl').innerText = (data.fl_pressure === null) ? "--" : parseFloat(data.fl_pressure).toFixed(0);
                if (data.fr_pressure !== undefined) document.getElementById('tpms_fr').innerText = (data.fr_pressure === null) ? "--" : parseFloat(data.fr_pressure).toFixed(0);
                if (data.rl_pressure !== undefined) document.getElementById('tpms_rl').innerText = (data.rl_pressure === null) ? "--" : parseFloat(data.rl_pressure).toFixed(0);
                if (data.rr_pressure !== undefined) document.getElementById('tpms_rr').innerText = (data.rr_pressure === null) ? "--" : parseFloat(data.rr_pressure).toFixed(0);
                if (data.limit !== undefined) {
                    const limitVal = (data.limit === null || data.limit === undefined) ? "--" : data.limit;
                    document.getElementById('limit_value').innerText = limitVal;
                    window._currentLimit = data.limit;
                }

                if (data.enableOcr !== undefined) {
                    window._ocrEnabled = data.enableOcr;
                }

                // --- 測速與警示整合邏輯 ---
                const now = Date.now();
                const hasCameraData = (data.cameraInfo && data.cameraInfo !== null);

                // 啟動 3 秒強迫顯示計時 (僅針對測速照相點)
                if (hasCameraData && !alertStartTime) {
                    alertStartTime = now;
                    minDisplayUntil = now + 4000; // 3秒 + 1秒緩衝
                }

                const isTimedOut = alertStartTime ? (now - alertStartTime > ALERT_TIMEOUT_MS) : false;

                // 顯示紅圈限速牌的條件：
                // (OCR開啟且有偵測速限) OR (正在觸發測速點且未超時) OR (3秒強迫顯示中)
                const isCameraAlertActive = (hasCameraData || now < minDisplayUntil) && !isTimedOut;
                const shouldShowLimit = (window._ocrEnabled && window._currentLimit) || isCameraAlertActive;

                const wrapper = document.getElementById('limit_wrapper');
                if (wrapper) wrapper.style.display = shouldShowLimit ? 'flex' : 'none';

                // 更新限速數值：優先顯示測速照相點的速限，並防止顯示為 --
                if (shouldShowLimit) {
                    let displayLimit = window._currentLimit;

                    if (isCameraAlertActive) {
                        // 如果有新資料，更新暫存值
                        if (data.cameraInfo && data.cameraInfo.limit) {
                            lastCameraLimit = data.cameraInfo.limit;
                        }
                        // 警示期間，若有暫存值則鎖定顯示，避免變回 --
                        if (lastCameraLimit) {
                            displayLimit = lastCameraLimit;
                        }
                    }

                    document.getElementById('limit_value').innerText = displayLimit || "--";
                }

                if (!hasCameraData && now >= minDisplayUntil) {
                    alertStartTime = null; // 徹底離開後重置計時
                    lastCameraLimit = null; // 重置暫存速限
                }

                const divider = document.getElementById('ocr_off_divider');
                if (divider) divider.style.display = shouldShowLimit ? 'none' : 'block';

                const centralGroup = document.getElementById('central_group');
                if (centralGroup) {
                    if (shouldShowLimit) {
                        centralGroup.classList.remove('-translate-y-20');
                    } else {
                        centralGroup.classList.add('-translate-y-20');
                    }
                }

                // 胎壓對照表
                const tpmsMapping = {
                    'fl_pressure': 'tpms_fl',
                    'fr_pressure': 'tpms_fr',
                    'rl_pressure': 'tpms_rl',
                    'rr_pressure': 'tpms_rr'
                };

                // 處理 nested tires 結構
                if (data.tires) {
                    const tires = data.tires;
                    const nestedMap = { 'fl': 'tpms_fl', 'fr': 'tpms_fr', 'rl': 'tpms_rl', 'rr': 'tpms_rr' };
                    Object.keys(nestedMap).forEach(key => {
                        if (tires[key] !== undefined) {
                            const targetId = nestedMap[key];
                            const el = document.getElementById(targetId);
                            if (el) {
                                const val = parseFloat(tires[key]);
                                if (val === 0 || isNaN(val)) {
                                    el.innerText = '--';
                                    el.classList.remove('alert-pulse');
                                    markCardValueChange(targetId, el.innerText, 'card-tpms');
                                } else {
                                    el.innerText = Math.round(val);
                                    if (val < 32) el.classList.add('alert-pulse');
                                    else el.classList.remove('alert-pulse');
                                    markCardValueChange(targetId, el.innerText, 'card-tpms');
                                }
                            }
                        }
                    });
                }

                // 處理扁平化 tpms 結構 (相容舊模擬器與現有邏輯)
                Object.keys(tpmsMapping).forEach(key => {
                    if (data[key] !== undefined) {
                        const targetId = tpmsMapping[key];
                        const el = document.getElementById(targetId);
                        if (el) {
                            const val = parseFloat(data[key]);
                            if (isNaN(val) || val === 0) {
                                el.innerText = '--';
                                el.classList.remove('alert-pulse');
                                markCardValueChange(targetId, el.innerText, 'card-tpms');
                            } else {
                                el.innerText = Math.round(val);
                                if (val < 32) el.classList.add('alert-pulse');
                                else el.classList.remove('alert-pulse');
                                markCardValueChange(targetId, el.innerText, 'card-tpms');
                            }
                        }
                    }
                });

                // 相容 obdSppService.dart 原生屬性 (如果有傳過來的話)
                ['tpmsFl', 'tpmsFr', 'tpmsRl', 'tpmsRr'].forEach(key => {
                    if (data[key] !== undefined) {
                        const idMap = { 'tpmsFl': 'tpms_fl', 'tpmsFr': 'tpms_fr', 'tpmsRl': 'tpms_rl', 'tpmsRr': 'tpms_rr' };
                        const targetId = idMap[key];
                        const el = document.getElementById(targetId);
                        const val = parseFloat(data[key]);
                        if (el && !isNaN(val) && val > 0) {
                            el.innerText = Math.round(val);
                            if (val < 32) el.classList.add('alert-pulse');
                            else el.classList.remove('alert-pulse');
                            markCardValueChange(targetId, el.innerText, 'card-tpms');
                        }
                    }
                });

                // 處理速限燈效
                const speed = parseInt(document.getElementById('speed').innerText);
                const limitText = document.getElementById('limit_value').innerText;
                const limit = parseInt(limitText);
                const speedEl = document.getElementById('speed');

                if (window._ocrEnabled !== false && !isNaN(limit) && limit > 0 && speed > limit + 10) {
                    speedEl.classList.add('speed-red-glow');
                } else {
                    speedEl.classList.remove('speed-red-glow');
                }
            }

            function resizeApp() {
                const container = document.getElementById('app-container');
                if (!container) return;
                const scale = Math.min(window.innerWidth / 2400, window.innerHeight / 1080);
                container.style.transform = `scale(${scale})`;
            }
            window.addEventListener('resize', resizeApp);
            window.addEventListener('orientationchange', resizeApp);
            window.addEventListener('load', resizeApp);

            // 監聽來自 simulator 模擬器的跨來源呼叫
            window.addEventListener('message', function (event) {
                // 如果是字串嘗試轉換後丟給 updateDashboard
                if (typeof event.data === 'string') {
                    try {
                        const parsed = JSON.parse(event.data);
                        updateDashboard(parsed);
                    } catch (e) { }
                }
            });

        </script>
