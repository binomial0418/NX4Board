<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="tailwind.min.js"></script>
    <title>Tucson Link Dashboard - Max Speed Limit</title>
    <style>
        @font-face {
            font-family: 'Chakra Petch';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/ChakraPetch-Bold.woff2') format('woff2');
        }

        /* 引入圓潤且具備高級幾何感的 Outfit 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&display=swap');

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* 圓潤數值專用樣式 */
        .val-rounded {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: 0.04em;
            transform: translateZ(0);
            /* 硬體加速，減少更新時的閃爍 */
        }

        .data-card {
            position: relative;
            border-left: 6px solid;
            border-left-color: var(--stripe-color, transparent);
            background: linear-gradient(90deg, rgba(31, 41, 55, 0.6) 0%, rgba(31, 41, 55, 0) 100%);
            transition: border-color 0.35s ease, box-shadow 0.35s ease;
            transform: translateZ(0);
            /* 數據包裝容器硬體加速 */
        }

        .data-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.0), transparent 150%);
            opacity: 0;
            transition: background 0.35s ease, opacity 0.35s ease, box-shadow 0.35s ease;
        }

        .data-card.card-update::before {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
            opacity: 1;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.45);
        }

        .font-mono-custom {
            font-family: 'ui-monospace', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* 速限看板：加大至 22rem 避免三位數字溢出 */
        .speed-limit-sign {
            width: 22rem;
            height: 22rem;
            background-color: white;
            border: 2rem solid #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .speed-red-glow {
            filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)) !important;
            color: #ffcccc !important;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100%;
            }
        }

        .alert-pulse {
            animation: text-pulse-red 0.8s infinite alternate !important;
            color: #ff3333 !important;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8) !important;
        }

        @keyframes text-pulse-red {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        .alert-pulse-blue {
            animation: text-pulse-blue 0.8s infinite alternate !important;
            color: #60a5fa !important;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.8) !important;
        }

        @keyframes text-pulse-blue {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        .camera-alert-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(185, 28, 28, 0.95) 100%);
            border: 6px solid #fff;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
            animation: slide-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        @keyframes slide-up {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* --- UI 2 專用樣式 --- */
        .speed-dial-svg {
            transform: rotate(-225deg);
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
        }

        .turbo-bar-flex-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            margin-top: 1rem;
            width: 920px;
        }

        .turbo-bar-center-container {
            width: 720px;
            height: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            position: relative;
            overflow: visible;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .turbo-bar-center-zero {
            position: absolute;
            left: 33.33%;
            top: -10px;
            bottom: -10px;
            width: 4px;
            background: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .turbo-bar-center-active {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 24px;
            transition: width 0.08s ease-out, left 0.08s ease-out, background 0.3s ease;
            box-shadow: 0 0 20px var(--bar-glow, transparent);
        }

        .turbo-bar-center-peak {
            position: absolute;
            top: -8px;
            bottom: -8px;
            width: 5px;
            background: #ff3333;
            border-radius: 2px;
            box-shadow: 0 0 12px #ff0000;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 20;
        }

        .turbo-bar-label {
            position: absolute;
            top: 48px;
            transform: translateX(-50%);
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
        }

        .turbo-val-center {
            font-size: 5.5rem;
            color: white;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            width: auto;
            text-align: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .speed-v2-wrapper {
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .speed-dial-bg {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-dasharray: 904 1206;
            /* 2*PI*192*0.75 ≈ 904 arc */
            stroke-dashoffset: 0;
        }

        .speed-dial-progress {
            stroke: #3b82f6;
            stroke-dasharray: 904 1206;
            stroke-dashoffset: 904;
            transition: stroke-dashoffset 0.3s ease-out, stroke 0.3s ease;
        }

        .ui-toggle-btn {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 200px;
            background: linear-gradient(270deg, rgba(59, 130, 246, 0.4) 0%, transparent 100%);
            border-left: 2px solid rgba(59, 130, 246, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: background 0.3s;
        }

        .ui-toggle-btn:hover {
            background: linear-gradient(270deg, rgba(59, 130, 246, 0.7) 0%, transparent 100%);
        }

        .ui-toggle-btn span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: bold;
            letter-spacing: 0.5em;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
        }

        .hidden-ui {
            display: none !important;
        }

        /* --- 動畫過場樣式 --- */
        .ui-fade-container {
            position: absolute;
            top: 48px;
            left: 48px;
            width: calc(100% - 96px);
            height: calc(100% - 96px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            /* 移除長期使用的 will-change，避免頻繁重繪全螢幕 */
            display: flex;
        }

        .ui-active {
            opacity: 1;
            transform: none;
            /* 靜態時不使用 transform */
            pointer-events: auto;
            visibility: visible;
            z-index: 30;
        }

        .ui-inactive {
            opacity: 0;
            transform: scale(0.96);
            /* 僅在靜止隱藏或動畫時使用 scale */
            pointer-events: none;
            visibility: hidden;
            z-index: 20;
        }
    </style>
</head>

                                <span class="turbo-bar-label" style="left: 0%">-1</span>
                                <span class="turbo-bar-label" style="left: 33.33%">0</span>

        <script>
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('time').innerText = `${h}:${m}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            const CARD_HIGHLIGHT_DURATION = 420;
            const highlightTimers = {};
            let alertStartTime = null;
            let minDisplayUntil = 0;
            let lastCameraLimit = null;
            const ALERT_TIMEOUT_MS = 60000;

            let currentView = 1;
            let dialAnimationActive = false;

            function toggleUI() {
                const v1 = document.getElementById('ui-v1');
                const v2 = document.getElementById('ui-v2');

                if (currentView === 1) {
                    // 切換至 UI 2
                    v1.classList.replace('ui-active', 'ui-inactive');
                    v2.classList.replace('ui-inactive', 'ui-active');
                    currentView = 2;

                    // 稍微延遲撥桿動畫，增加視覺層次感
                    setTimeout(() => {
                        startDialAnimation();
                    }, 200);
                } else {
                    // 切換至 UI 1
                    v2.classList.replace('ui-active', 'ui-inactive');
                    v1.classList.replace('ui-inactive', 'ui-active');
                    currentView = 1;
                }
            }

            function setDialSpeed(speed) {
                const progress = document.getElementById('speed_dial_progress');
                if (!progress) return;
                const maxSpeed = 180;
                const arcLength = 904; // 2 * PI * 192 * 0.75
                const clampedSpeed = Math.min(Math.max(speed, 0), maxSpeed);
                const offset = arcLength - (clampedSpeed / maxSpeed) * arcLength;
                progress.style.strokeDashoffset = offset;

                // 顏色過渡 (0: blue, 120: yellow, 180: red)
                if (clampedSpeed > 140) progress.style.stroke = '#ef4444';
                else if (clampedSpeed > 100) progress.style.stroke = '#f59e0b';
                else progress.style.stroke = '#3b82f6';
            }

            function startDialAnimation() {
                if (dialAnimationActive) return;
                dialAnimationActive = true;
                const dial = document.getElementById('speed_dial_progress');
                const speedText = document.getElementById('speed_v2');
                if (!dial || !speedText) {
                    dialAnimationActive = false;
                    return;
                }

                const duration = 1500;
                const startTime = Date.now();

                // 啟動動畫期間關閉 transition，確保物理圓環跟得上快速變化的模擬數字
                dial.style.transition = 'none';

                function animate() {
                    const now = Date.now();
                    const elapsed = now - startTime;
                    const progress_ratio = Math.min(elapsed / duration, 1);

                    // 0 -> 1 -> 0 sweep
                    const sweep = Math.sin(progress_ratio * Math.PI);

                    // 同步模擬數字 (0-180)
                    const simSpeed = Math.round(sweep * 180);
                    speedText.innerText = simSpeed;
                    speedText.style.fontSize = (simSpeed > 99) ? '24rem' : '30rem';
                    // 同步更新圓環與顏色
                    setDialSpeed(simSpeed);

                    if (progress_ratio < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        dialAnimationActive = false;
                        // 動畫結束，恢復實際值並開啟 transition
                        dial.style.transition = 'stroke-dashoffset 0.3s ease-out, stroke 0.3s ease';

                        if (window.lastData && window.lastData.speed !== undefined) {
                            const finalSpeed = Math.round(window.lastData.speed);
                            speedText.innerText = finalSpeed;
                            speedText.style.fontSize = (finalSpeed > 99) ? '24rem' : '30rem';
                            setDialSpeed(window.lastData.speed);
                        } else {
                            speedText.innerText = "0";
                            speedText.style.fontSize = '30rem';
                            setDialSpeed(0);
                        }
                    }
                }
                animate();
            }

            const prevValues = {
                rpm: '',
                tpms_fl: '',
                tpms_fr: '',
                tpms_rl: '',
                tpms_rr: '',
                temp: '',
                battery: '',
                fuel: '',
                odo: '',
                turbo: ''
            };
            let lastRpm = 0;

            function triggerCardHighlight(cardId) {
                const card = document.getElementById(cardId);
                if (!card) return;
                card.classList.add('card-update');
                if (highlightTimers[cardId]) {
                    clearTimeout(highlightTimers[cardId]);
                }
                highlightTimers[cardId] = setTimeout(() => {
                    card.classList.remove('card-update');
                    highlightTimers[cardId] = null;
                }, CARD_HIGHLIGHT_DURATION);
            }

            function markCardValueChange(key, value, cardId) {
                if (value === undefined || value === null) return false;
                const normalized = String(value);
                if (prevValues[key] === normalized) return false;
                prevValues[key] = normalized;
                triggerCardHighlight(cardId);
                if (cardId.includes('-v2')) return true; // Avoid double triggering if called twice
                // Sync to v2 if exists
                const v2CardId = cardId + '-v2';
                triggerCardHighlight(v2CardId);
                return true;
            }

            function updateDashboard(data) {
                if (typeof data === 'string') {
                    try {
                        data = JSON.parse(data);
                    } catch (e) { return; }
                }

                if (data.speed !== undefined) {
                    const speedVal = (data.speed === null) ? 0 : Math.round(parseFloat(data.speed));
                    window._lastValidSpeed = speedVal;
                    const display = (data.speed === null) ? "--" : speedVal;
                    document.getElementById('speed').innerText = display;
                    const speedV2 = document.getElementById('speed_v2');
                    if (speedV2) {
                        speedV2.innerText = display;
                        speedV2.style.fontSize = (speedVal > 99) ? '24rem' : '30rem';
                    }
                    if (!dialAnimationActive) setDialSpeed(speedVal);
                }

                if (data.rpm !== undefined) {
                    const rpmEl = document.getElementById('rpm');
                    const rpmEl2 = document.getElementById('rpm_v2');
                    const rpmUnit = document.getElementById('rpm_unit');
                    const rpmUnit2 = document.getElementById('rpm_unit_v2');

                    lastRpm = (data.rpm === null) ? 0 : Math.round(parseFloat(data.rpm));

                    if (data.rpm === null) {
                        [rpmEl, rpmEl2].forEach(el => {
                            if (el) {
                                el.innerText = "--";
                                el.classList.remove('text-green-500', 'italic');
                                el.classList.add('text-white');
                            }
                        });
                        if (rpmUnit) rpmUnit.style.display = 'inline';
                        if (rpmUnit2) rpmUnit2.style.display = 'inline';
                    } else {
                        const rpmVal = Math.round(parseFloat(data.rpm));
                        const isEV = (rpmVal === 0);
                        const display = isEV ? 'EV' : rpmVal;

                        [rpmEl, rpmEl2].forEach(el => {
                            if (el) {
                                el.innerText = display;
                                if (isEV) {
                                    el.classList.remove('text-white', 'text-blue-400');
                                    el.classList.add('text-green-500', 'italic');
                                } else {
                                    el.classList.remove('text-green-500', 'italic');
                                    el.classList.add(el.id === 'rpm' ? 'text-white' : 'text-blue-400');
                                }
                            }
                        });
                        if (rpmUnit) rpmUnit.style.display = isEV ? 'none' : 'inline';
                        if (rpmUnit2) rpmUnit2.style.display = isEV ? 'none' : 'inline';
                    }
                    markCardValueChange('rpm', data.rpm, 'card-rpm');
                }

                if (data.temperature !== undefined) {
                    const val = (data.temperature === null) ? null : Math.round(parseFloat(data.temperature));
                    const display = (val === null) ? "--" : val;
                    document.getElementById('temp').innerText = display;
                    document.getElementById('temp_v2').innerText = display;
                    markCardValueChange('temp', val, 'card-temp');

                    const els = [document.getElementById('temp'), document.getElementById('temp_v2')];
                    els.forEach(el => {
                        if (!el) return;
                        el.classList.remove('alert-pulse', 'alert-pulse-blue');
                        if (val !== null) {
                            if (val > 110) el.classList.add('alert-pulse');
                            else if (val < 40) el.classList.add('alert-pulse-blue');
                        }
                    });
                }

                if (data.battery !== undefined) {
                    const val = (data.battery === null) ? "--" : parseFloat(data.battery).toFixed(1);
                    document.getElementById('battery').innerText = val;
                    document.getElementById('battery_v2').innerText = val;
                    markCardValueChange('battery', val, 'card-battery');
                }

                if (data.turbo !== undefined) {
                    const rawTurbo = (data.turbo === null) ? 0 : parseFloat(data.turbo);
                    let turboVal = rawTurbo;
                    const absTurbo = Math.abs(rawTurbo);

                    // 實作顯示死區 (Display Deadzone)
                    if (lastRpm === 0 && absTurbo < 0.05) {
                        turboVal = 0;
                    } else if (absTurbo < 0.02) {
                        turboVal = 0;
                    }

                    // Center Bar Logic: -1 to +2 (total 3), 0 is at 33.33%
                    const cBar = document.getElementById('turbo_bar_center_active');
                    const cPeak = document.getElementById('turbo_bar_center_peak');
                    const cVal = document.getElementById('turbo_val_center');
                    if (cVal) cVal.innerText = turboVal.toFixed(2) + " BAR";

                    if (cBar) {
                        const clamped = Math.min(Math.max(turboVal, -1), 2);
                        const zeroPoint = 33.333; // % from left

                        if (clamped >= 0) {
                            // Right from zero: 0 to 2 mapped to 33.33 to 100%
                            const width = (clamped / 2) * (100 - zeroPoint);
                            cBar.style.left = zeroPoint + '%';
                            cBar.style.width = width + '%';
                            cBar.style.background = '#ff3333'; // Red
                            cBar.style.setProperty('--bar-glow', 'rgba(255, 51, 51, 0.5)');
                        } else {
                            // Left from zero: 0 to -1 mapped to 33.33 to 0%
                            const width = (Math.abs(clamped) / 1) * zeroPoint;
                            cBar.style.left = (zeroPoint - width) + '%';
                            cBar.style.width = width + '%';
                            cBar.style.background = '#60a5fa'; // Gray Blue
                            cBar.style.setProperty('--bar-glow', 'rgba(96, 165, 250, 0.5)');
                        }

                        // Peak Retention Logic (2 seconds) - Improved Robustness
                        if (cPeak) {
                            const lastVal = window._lastTurboVal || 0;
                            const diff = turboVal - lastVal;

                            // Use sign of movement, filtering noise
                            const currentDir = (Math.abs(diff) < 0.005) ? 0 : Math.sign(diff);

                            if (currentDir !== 0 && window._lastTurboDir !== undefined && currentDir !== window._lastTurboDir) {
                                // Direction flipped! Show red cursor at the extreme (lastVal)
                                cPeak.style.transition = 'none';
                                cPeak.style.left = `calc(${((lastVal + 1) / 3) * 100}% - 2px)`;
                                cPeak.style.opacity = '1';

                                if (window._turboPeakTimer) clearTimeout(window._turboPeakTimer);
                                window._turboPeakTimer = setTimeout(() => {
                                    cPeak.style.transition = 'opacity 0.4s ease';
                                    cPeak.style.opacity = '0';
                                    window._turboPeakTimer = null;
                                }, 2000);
                            }

                            if (currentDir !== 0) {
                                window._lastTurboDir = currentDir;
                            }
                            window._lastTurboVal = turboVal;
                        }
                    }
                }

                if (data.odometer !== undefined || data.odo !== undefined || data.mileage !== undefined) {
                    const val = data.odometer || data.odo || data.mileage;
                    const text = (val === null || val === undefined) ? "--" : Math.round(val);
                    document.getElementById('odo').innerText = text;
                    document.getElementById('odo_v2').innerText = text;
                    markCardValueChange('odo', text, 'card-odo-fuel');
                }

                if (data.fuel !== undefined || data.fuelLevel !== undefined) {
                    const val = data.fuel !== undefined ? data.fuel : data.fuelLevel;
                    const fuelVal = (val === null || val === undefined) ? null : Math.round(val);
                    const display = (fuelVal === null) ? "--" : fuelVal;
                    document.getElementById('fuel').innerText = display;
                    document.getElementById('fuel_v2').innerText = display;
                    markCardValueChange('fuel', fuelVal, 'card-odo-fuel');
                }

                // 胎壓
                const tpmsMap = {
                    'tpms_fl': ['tpmsFl', 'fl_pressure', 'fl'],
                    'tpms_fr': ['tpmsFr', 'fr_pressure', 'fr'],
                    'tpms_rl': ['tpmsRl', 'rl_pressure', 'rl'],
                    'tpms_rr': ['tpmsRr', 'rr_pressure', 'rr']
                };

                Object.keys(tpmsMap).forEach(id => {
                    const sources = tpmsMap[id];
                    let val = null;
                    for (let s of sources) {
                        if (data[s] !== undefined) { val = data[s]; break; }
                        if (data.tires && data.tires[s] !== undefined) { val = data.tires[s]; break; }
                    }

                    const display = (val === undefined || val === null || val === 0) ? "--" : Math.round(val);
                    const el1 = document.getElementById(id);
                    const el2 = document.getElementById(id + '_v2');

                    if (el1) {
                        el1.innerText = display;
                        if (val !== null && val > 0 && val < 32) el1.classList.add('alert-pulse');
                        else el1.classList.remove('alert-pulse');
                    }
                    if (el2) {
                        el2.innerText = display;
                        if (val !== null && val > 0 && val < 32) el2.classList.add('alert-pulse');
                        else el2.classList.remove('alert-pulse');
                    }
                });
                markCardValueChange('tpms', '', 'card-tpms');

                if (data.limit !== undefined) {
                    const val = (data.limit === null || data.limit === undefined) ? "--" : data.limit;
                    document.getElementById('limit_value').innerText = val;
                    window._currentLimit = data.limit;
                }
                if (data.enableOcr !== undefined) window._ocrEnabled = data.enableOcr;

                // --- 測速警示邏輯 ---
                const now = Date.now();
                const hasCameraData = (data.cameraInfo && data.cameraInfo !== null);
                if (hasCameraData && !alertStartTime) {
                    alertStartTime = now;
                    minDisplayUntil = now + 4000;
                }
                const isTimedOut = alertStartTime ? (now - alertStartTime > ALERT_TIMEOUT_MS) : false;
                const isCameraAlertActive = (hasCameraData || now < minDisplayUntil) && !isTimedOut;

                // UI 2 Info Switch
                const timeV2 = document.getElementById('time_v2');
                const cameraV2 = document.getElementById('camera_alert_v2');
                if (isCameraAlertActive) {
                    timeV2.classList.add('hidden');
                    cameraV2.classList.remove('hidden');
                    const camLimit = (data.cameraInfo && data.cameraInfo.limit) || lastCameraLimit || "--";
                    document.getElementById('camera_limit_v2').innerText = camLimit;
                    if (data.cameraInfo && data.cameraInfo.limit) lastCameraLimit = data.cameraInfo.limit;
                } else {
                    timeV2.classList.remove('hidden');
                    cameraV2.classList.add('hidden');
                    alertStartTime = null;
                    lastCameraLimit = null;
                }

                // UI 1 Limit Wrapper
                const shouldShowLimit = (window._ocrEnabled && window._currentLimit) || isCameraAlertActive;
                const wrapper = document.getElementById('limit_wrapper');
                const centralGroup = document.getElementById('central_group');

                if (wrapper) wrapper.style.display = shouldShowLimit ? 'flex' : 'none';
                if (shouldShowLimit && document.getElementById('limit_value')) {
                    document.getElementById('limit_value').innerText = (isCameraAlertActive ? lastCameraLimit : window._currentLimit) || "--";
                }

                if (centralGroup) {
                    if (shouldShowLimit) {
                        centralGroup.classList.remove('-translate-y-32');
                    } else {
                        centralGroup.classList.add('-translate-y-32');
                    }
                }

                // 速度紅圈連動
                const speed = parseInt(document.getElementById('speed').innerText);
                const limit = parseInt(document.getElementById('limit_value').innerText);
                const speedEl = document.getElementById('speed');
                const speedEl2 = document.getElementById('speed_v2');
                if (window._ocrEnabled !== false && !isNaN(limit) && limit > 0 && speed > limit + 10) {
                    speedEl.classList.add('speed-red-glow');
                    speedEl2.classList.add('speed-red-glow');
                } else {
                    speedEl.classList.remove('speed-red-glow');
                    speedEl2.classList.remove('speed-red-glow');
                }
            }

            // 初始動畫觸發 (或是接到外部電源喚醒時)
            // 監聽來自 Flutter 的喚醒或啟動指令
            window.addEventListener('message', function (event) {
                if (typeof event.data === 'string') {
                    try {
                        const parsed = JSON.parse(event.data);
                        if (parsed.type === 'WAKEUP') {
                            if (currentView === 2) startDialAnimation();
                        } else {
                            updateDashboard(parsed);
                        }
                    } catch (e) { }
                }
            });

            // 初始化與自動更新
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const timeStr = `${h}:${m}`;
                document.getElementById('time').innerText = timeStr;
                document.getElementById('time_v2').innerText = timeStr;
            }
            setInterval(updateClock, 1000);
            updateClock();

            function resizeApp() {
                const container = document.getElementById('app-container');
                if (!container) return;
                const scale = Math.min(window.innerWidth / 2400, window.innerHeight / 1080);
                container.style.transform = `scale(${scale})`;
            }
            window.addEventListener('resize', resizeApp);
            window.addEventListener('orientationchange', resizeApp);
            window.addEventListener('load', () => { resizeApp(); if (currentView === 2) startDialAnimation(); });
        </script>
    </div>
</body>
