name: speed_limit_app
description: A Flutter app to detect and warn about speed limits using GPS and OCR.

publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # GPS & Location
  geolocator: ^10.1.0
  
  # CSV Parsing
  csv: ^6.0.0
  
  # Permission Handler
  permission_handler: ^12.0.1
  
  # State Management
  provider: ^6.1.0
  
  # UI
  cupertino_icons: ^1.0.2
  image: ^4.8.0
  package_info_plus: ^9.0.0
  flutter_inappwebview: ^6.1.5
  web_socket_channel: ^3.0.3
  battery_plus: ^7.0.0
  wakelock_plus: ^1.4.0
  flutter_foreground_task: ^9.2.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - 省道速限圖資.csv
    - assets/cd.html
    - assets/tailwind.min.js
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
